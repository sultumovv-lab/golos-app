<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rezon — голос, речь, уверенность</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1C1A22; --card: #28252F; --border: #38343F;
      --primary: #E85D43; --gold: #FF9F45; --green: #4ADE80;
      --pink: #FF7A5C; --purple: #FFB199;
      --text: #FFFFFF; --muted: #9A93A0; --dim: #6E6676;
      --secondary: #FFB199; --coral-1: #FF7A5C; --coral-3: #C9492F;
      --nav-bg: #161419;
      --grad: linear-gradient(135deg,#FF7A5C 0%,#E85D43 55%,#C9492F 100%);
      --font-head: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--font-body);
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      max-width: 430px; margin: 0 auto;
    }
    ::-webkit-scrollbar { display: none; } * { scrollbar-width: none; }

    h1, h2, h3, .page-title, .stat-v, .price, .cat-name, .lbl, .nav-label, #breath-num { font-family: var(--font-head); }

    /* NAV */
    .nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: #161419; border-top: 1px solid var(--border);
      display: flex; padding: 8px 0 calc(16px + env(safe-area-inset-bottom)); z-index: 100;
    }
    .nav-btn { flex: 1; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 0; }
    .nav-icon { font-size: 20px; }
    .nav-label { font-size: 10px; font-weight: 600; color: var(--dim); }
    .nav-label.on { color: var(--primary); }

    /* SCREENS */
    .screen { padding-bottom: 84px; }
    .hero { background: linear-gradient(180deg,#211E29 0%,var(--bg) 100%); padding: 52px 20px 20px; }
    #wave { width: 100%; height: 52px; display: block; }

    /* CARDS */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
    .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* BUTTONS */
    .btn { display: block; width: 100%; padding: 15px 24px; border: none; border-radius: 16px; font-size: 15px; font-weight: 700; color: white; cursor: pointer; text-align: center; font-family: inherit; transition: opacity .15s; }
    .btn:active { opacity: .8; }
    .btn-p { background: var(--grad); box-shadow: 0 6px 18px rgba(232,93,67,.32); }
    .btn-g { background: var(--green); }
    .btn-pk { background: var(--pink); }
    .btn-r { background: #EF4444; }
    .btn-d { background: var(--dim); }
    .btn-sm { width: auto; padding: 6px 12px; font-size: 12px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); color: var(--muted); }

    /* SECTION LABEL */
    .lbl { color: var(--primary); font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }

    /* STAT */
    .stats-row { display: flex; gap: 10px; }
    .stat { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 10px; text-align: center; }
    .stat-v { font-size: 22px; font-weight: 800; line-height: 1.1; }
    .stat-l { font-size: 9px; font-weight: 600; color: var(--dim); margin-top: 2px; text-transform: uppercase; letter-spacing: .05em; }

    /* EXERCISE CARD */
    .ex-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; margin-bottom: 10px; transition: border-color .15s; }
    .ex-card:active { border-color: var(--primary); }
    .ex-ico { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .ex-info { flex: 1; min-width: 0; }
    .ex-title { font-size: 14px; font-weight: 600; }
    .ex-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .ex-meta { flex-shrink: 0; text-align: right; }
    .ex-time { font-size: 11px; color: var(--muted); }
    .ex-diff { font-size: 10px; font-weight: 600; margin-top: 3px; }
    .d-e { color: var(--green); } .d-m { color: var(--gold); } .d-h { color: #EF4444; }

    /* CAT CARD */
    .cat-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px 16px; cursor: pointer; transition: border-color .15s; }
    .cat-card:active { border-color: var(--primary); }
    .cat-icon { font-size: 28px; margin-bottom: 10px; }
    .cat-name { font-size: 15px; font-weight: 700; }
    .cat-desc { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .cat-cnt { font-size: 11px; font-weight: 700; margin-top: 10px; }

    /* BACK BTN */
    .back { color: var(--primary); background: none; border: none; font-size: 14px; cursor: pointer; font-weight: 600; padding: 0; margin-bottom: 16px; font-family: inherit; }

    /* FULL SCREEN EXERCISE */
    .ex-screen { background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200; overflow-y: auto; }
    .ex-hdr { padding: 52px 20px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
    .progress-bar { background: var(--border); border-radius: 4px; height: 3px; margin: 0 20px 0; }
    .progress-fill { height: 3px; border-radius: 4px; background: var(--primary); transition: width 1s linear; }
    .ex-body { flex: 1; padding: 0 20px 24px; display: flex; flex-direction: column; }

    /* TEXT BLOCK */
    .text-block { background: linear-gradient(135deg,#2A2730,#211E29); border: 1px solid var(--border); border-radius: 18px; padding: 24px; flex: 1; margin-bottom: 14px; }
    .read-text { color: var(--text); font-size: 18px; line-height: 1.85; font-weight: 600; white-space: pre-line; letter-spacing: .02em; }

    /* BREATHING */
    .breath-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #breath-circle {
      width: 150px; height: 150px; border-radius: 50%;
      border: 3px solid var(--primary); display: flex; flex-direction: column; align-items: center; justify-content: center;
      transform: scale(0.7);
    }
    #breath-num { font-size: 38px; font-weight: 800; line-height: 1; color: var(--primary); }
    #breath-phase { font-size: 14px; font-weight: 600; margin-top: 6px; color: var(--primary); }
    .breath-dots { display: flex; gap: 20px; margin-top: 64px; }
    .b-dot-wrap { text-align: center; }
    .b-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); margin: 0 auto 5px; transition: background .3s; }
    .b-dot.on { box-shadow: 0 0 8px currentColor; }
    .b-dot-dur { font-size: 10px; font-weight: 600; color: var(--dim); }
    .b-dot-name { font-size: 9px; color: var(--dim); }

    /* DONE */
    .done-screen { background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; position: fixed; top:0;left:0;right:0;bottom:0;z-index:300; }

    /* TRANSCRIPT */
    .transcript { background: #211E29; border-radius: 12px; padding: 14px; margin-bottom: 14px; }

    /* COACH */
    .coach-screen { display: flex; flex-direction: column; height: 100vh; position: fixed; top:0;left:0;right:0;bottom:0;z-index:50;background:var(--bg); max-width:430px;margin:0 auto; }
    .chat-msgs { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .msg { display: flex; margin-bottom: 12px; }
    .msg-r { justify-content: flex-end; }
    .msg-l { justify-content: flex-start; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; margin-right: 8px; flex-shrink: 0; align-self: flex-end; }
    .bubble { max-width: 78%; padding: 11px 15px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; }
    .bubble-u { background: var(--primary); border-radius: 18px 18px 4px 18px; color: white; }
    .bubble-b { background: var(--card); border: 1px solid var(--border); border-radius: 18px 18px 18px 4px; color: var(--text); }
    .chat-inp-area { padding: 10px 20px calc(20px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .chat-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .chat-inp { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; font-family: inherit; }
    .chat-inp:focus { border-color: var(--primary); }
    .chat-send { background: var(--primary); border: none; border-radius: 14px; padding: 0 18px; color: white; font-size: 20px; cursor: pointer; }
    .quick-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }

    /* HEATMAP */
    .heatmap { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }
    .hm-cell { aspect-ratio: 1; border-radius: 5px; background: var(--border); opacity: .4; }
    .hm-cell.on { background: var(--primary); box-shadow: 0 0 8px rgba(232,93,67,.5); opacity: 1; }

    /* ACHIEVEMENTS */
    .ach { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; opacity: .35; }
    .ach.done { opacity: 1; }
    .ach-ico { width: 42px; height: 42px; border-radius: 11px; background: #211E29; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .ach.done .ach-ico { background: #2E2228; border-color: var(--primary); }

    /* DOTS ANIMATION */
    @keyframes dp { 0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)} }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); display: inline-block; animation: dp 1.4s ease-in-out infinite; }

    /* UTILITIES */
    h1.page-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    p.page-sub { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    .gap-10 { display: flex; flex-direction: column; gap: 10px; }
    .row-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .link { color: var(--primary); background: none; border: none; font-size: 13px; cursor: pointer; font-weight: 600; font-family: inherit; }
    .mt { margin-top: auto; padding-top: 8px; }
    .text-center { text-align: center; }
    .tip-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-top: 16px; }

    /* SUBSCRIPTION CARD */
    .sub-card { background: linear-gradient(135deg,#33231E,#2A1D1A); border: 1px solid var(--primary); border-radius: 20px; padding: 24px; text-align: center; margin-bottom: 16px; }
    .price { font-size: 42px; font-weight: 900; background: var(--grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .price-sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .feature-list { text-align: left; margin-bottom: 20px; }
    .feature-item { color: var(--text); font-size: 14px; padding: 6px 0; }

    /* ─── TODAY / DAILY CYCLE (Stage 2) ─── */
    .avatar-ring { width: 58px; height: 58px; border-radius: 50%; padding: 2px; background: var(--grad); flex-shrink: 0; }
    .avatar-face { width: 100%; height: 100%; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 26px; }
    .wk-dot { width: 26px; height: 26px; border-radius: 50%; background: var(--border); margin: 0 auto; }
    .wk-dot.on { background: var(--grad); }
    .wk-dot.today { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--primary); }
    .step-card { background: var(--grad); border-radius: 20px; padding: 18px; color: #fff; cursor: pointer; box-shadow: 0 10px 26px rgba(232,93,67,.30); }
    .step-card:active { opacity: .92; }
    .step-ico { width: 50px; height: 50px; border-radius: 14px; background: rgba(255,255,255,.20); display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
    .video-ph { position: relative; width: 100%; aspect-ratio: 16/10; border-radius: 18px; background: linear-gradient(135deg,#2A2730,#211E29); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .video-ph-inner { text-align: center; color: var(--primary); }
    .video-ph-tag { position: absolute; bottom: 10px; left: 12px; background: rgba(0,0,0,.45); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; color: #fff; }
    .rec-badge { width: 40px; height: 40px; border-radius: 50%; background: var(--grad); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; }
    .rec-btn { width: 88px; height: 88px; border-radius: 50%; border: none; background: var(--grad); color: #fff; font-size: 32px; cursor: pointer; box-shadow: 0 8px 24px rgba(232,93,67,.35); position: relative; }
    .rec-btn.rec-on { background: #EF4444; }
    .rec-btn.rec-done { width: 64px; height: 64px; font-size: 24px; background: var(--card); border: 2px solid var(--primary); color: var(--primary); box-shadow: none; }
    .rec-pulse { position: absolute; inset: -7px; border-radius: 50%; border: 2px solid #EF4444; animation: pulse 1.2s ease-out infinite; }
    @keyframes pulse { 0% { transform: scale(1); opacity: .7; } 100% { transform: scale(1.35); opacity: 0; } }

    /* ─── ONBOARDING (Stage 3) ─── */
    .onb-opt { display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; color: var(--text); font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; transition: border-color .15s, transform .1s; margin-bottom: 10px; }
    .onb-opt:active { border-color: var(--primary); transform: scale(.99); }
    .onb-opt .oi { font-size: 22px; width: 30px; text-align: center; flex-shrink: 0; }
    .onb-chip { display: inline-block; background: rgba(232,93,67,.16); color: var(--secondary); border: 1px solid rgba(232,93,67,.4); border-radius: 20px; padding: 6px 12px; font-size: 13px; font-weight: 700; margin: 0 6px 6px 0; }
    .tf-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .tf-row:last-child { border-bottom: none; }
    .tf-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .lvl-badge { width: 44px; height: 44px; border-radius: 12px; background: var(--grad); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; flex-shrink: 0; }

    /* ─── VIDEO-CALL ROLEPLAY ─── */
    .call-screen { position: fixed; inset: 0; z-index: 200; background: radial-gradient(circle at 50% 28%, #2A2730 0%, var(--bg) 70%); display: flex; flex-direction: column; align-items: center; max-width: 430px; margin: 0 auto; }
    .call-top { width: 100%; padding: 48px 20px 0; display: flex; align-items: center; justify-content: space-between; }
    .call-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 0 24px; text-align: center; }
    .call-avatar { width: 156px; height: 156px; border-radius: 50%; padding: 4px; background: var(--grad); flex-shrink: 0; }
    .call-avatar .face { width: 100%; height: 100%; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 62px; }
    .call-avatar.speaking { animation: callpulse 1.1s ease-in-out infinite; }
    @keyframes callpulse { 0%,100% { box-shadow: 0 0 0 0 rgba(232,93,67,.55); } 50% { box-shadow: 0 0 0 20px rgba(232,93,67,0); } }
    .call-status { margin-top: 22px; font-size: 12px; font-weight: 700; color: var(--secondary); text-transform: uppercase; letter-spacing: .08em; }
    .call-sub { margin-top: 12px; font-size: 16px; line-height: 1.5; color: var(--text); max-width: 340px; min-height: 24px; }
    .call-self { position: absolute; top: 80px; right: 16px; width: 92px; height: 122px; border-radius: 14px; object-fit: cover; background: #000; border: 1px solid var(--border); transform: scaleX(-1); }
    .call-self-ph { position: absolute; top: 80px; right: 16px; width: 92px; height: 122px; border-radius: 14px; background: #15131a; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 26px; }
    .call-textrow { width: 100%; max-width: 390px; padding: 0 20px 8px; display: flex; gap: 8px; }
    .call-controls { width: 100%; padding: 8px 20px calc(28px + env(safe-area-inset-bottom)); display: flex; align-items: center; justify-content: center; gap: 22px; }
    .call-btn { border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .call-btn.mic { width: 78px; height: 78px; font-size: 28px; background: var(--grad); color: #fff; box-shadow: 0 8px 24px rgba(232,93,67,.35); position: relative; }
    .call-btn.mic.on { background: #EF4444; }
    .call-btn.end { width: 60px; height: 60px; font-size: 24px; background: #EF4444; color: #fff; }
    /* мульти-персонаж «совещание» */
    .meet-grid { width: 100%; max-width: 380px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; }
    .meet-tile { position: relative; aspect-ratio: 1; border-radius: 16px; background: var(--card); border: 2px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; transition: border-color .2s, box-shadow .2s; }
    .meet-tile.active { border-color: var(--primary); box-shadow: 0 0 22px rgba(232,93,67,.4); }
    .meet-tile .mface { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; background: var(--bg); }
    .meet-tile .mname { font-size: 13px; font-weight: 700; margin-top: 8px; }
    .meet-tile .mrole { font-size: 10px; color: var(--muted); }
    .meet-tile.user video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    .meet-badge { position: absolute; bottom: 6px; left: 6px; background: rgba(0,0,0,.5); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; color: #fff; }
    .coach-tip { margin: 0 16px 10px; background: rgba(255,177,153,.14); border: 1px solid var(--secondary); border-radius: 14px; padding: 12px 14px; font-size: 14px; line-height: 1.45; cursor: pointer; }
    .call-btn.coach { width: 56px; height: 56px; font-size: 22px; background: var(--card); border: 1px solid var(--secondary); color: var(--secondary); }

    /* ─── Анимации иконок ─── */
    /* эквалайзер на кнопке проигрывания записи */
    .eq { display: inline-flex; gap: 3px; align-items: center; height: 18px; color: currentColor; }
    .eq i { width: 3px; height: 6px; background: currentColor; border-radius: 2px; animation: eqb .9s ease-in-out infinite; }
    .eq i:nth-child(2) { animation-delay: .18s; }
    .eq i:nth-child(3) { animation-delay: .36s; }
    @keyframes eqb { 0%,100% { height: 5px; } 50% { height: 16px; } }
    /* отклик на нажатие */
    .btn:active { transform: scale(.985); }
    .ex-card:active, .cat-card:active, .step-card:active { transform: scale(.99); }
    .chat-send:active, .call-btn:active, .nav-btn:active { transform: scale(.92); }
    /* активная иконка нижней навигации */
    .nav-icon { display: inline-block; transition: transform .2s ease; }
    .nav-btn.active .nav-icon { transform: translateY(-2px) scale(1.16); }
  </style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#E85D43;font-size:36px;">🎤</div>
</div>

<script>
(function() {
'use strict';

// ═══════════════════════════════════════════
// TELEGRAM SETUP
// ═══════════════════════════════════════════
const tg = window.Telegram?.WebApp || {
  ready:()=>{}, expand:()=>{},
  HapticFeedback:{ impactOccurred:()=>{}, notificationOccurred:()=>{} },
  MainButton:{ show:()=>{}, hide:()=>{}, setText:()=>{}, onClick:()=>{}, offClick:()=>{}, isVisible:false },
  BackButton:{ show:()=>{}, hide:()=>{}, onClick:()=>{}, offClick:()=>{} },
  initDataUnsafe:{}, themeParams:{}, close:()=>{}, sendData:()=>{},
};
tg.ready();
tg.expand();

const user = tg.initDataUnsafe?.user;
const userName = user?.first_name || 'друг';

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const CATS = [
  { id:'breathing', name:'Дыхание',     icon:'🌊', color:'#E85D43', bg:'#2E2228', desc:'Основа голоса'     },
  { id:'diction',   name:'Дикция',       icon:'🎯', color:'#FF7A5C', bg:'#2E2228', desc:'Чёткость речи'     },
  { id:'resonance', name:'Резонанс',     icon:'🎵', color:'#FF9F45', bg:'#2E2228', desc:'Сила звука'         },
  { id:'pace',      name:'Темп',          icon:'⏱️', color:'#4ADE80', bg:'#1E261F', desc:'Ритм и паузы'      },
  { id:'confidence',name:'Уверенность',  icon:'⚡', color:'#FFB199', bg:'#2E2228', desc:'Внутренняя сила'   },
];

function buildPhases(pattern) {
  const p = [];
  if (pattern.inhale) p.push({ name:'Вдох',    dur:pattern.inhale, color:'#E85D43', scale:1.35 });
  if (pattern.hold)   p.push({ name:'Задержка', dur:pattern.hold,   color:'#FFB199', scale:1.35 });
  if (pattern.exhale) p.push({ name:'Выдох',   dur:pattern.exhale, color:'#4ADE80', scale:0.65 });
  if (pattern.pause)  p.push({ name:'Пауза',    dur:pattern.pause,  color:'#6E6676', scale:0.65 });
  return p;
}

// STORAGE (CloudStorage + localStorage fallback)
// ═══════════════════════════════════════════
const store = {
  get(key) {
    return new Promise(resolve => {
      const local = localStorage.getItem(key);
      try {
        if (tg.CloudStorage?.getItem) {
          tg.CloudStorage.getItem(key, (e, v) => resolve((e || !v) ? local : v));
        } else resolve(local);
      } catch (e) { resolve(local); }
    });
  },
  set(key, val) {
    try { localStorage.setItem(key, val); } catch (e) {}
    try { if (tg.CloudStorage?.setItem) tg.CloudStorage.setItem(key, val, () => {}); } catch (e) {}
  }
};

async function loadStats() {
  try {
    const raw = await store.get('vt2_stats');
    if (raw) {
      const s = JSON.parse(raw);
      if (s.lastDate !== today() && s.lastDate !== yesterday()) s.streak = 0;
      if (s.lastDate !== today()) s.today = 0;
      S.stats = s;
    }
  } catch(e) {}
}

function saveStats() {
  store.set('vt2_stats', JSON.stringify(S.stats));
  serverSave();
}

  if (!TG_INIT) return null;
  try {
    const res = await fetch('/api/state', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ initData: TG_INIT, action:'load' }) });
    if (!res.ok) return null;
    return await res.json();   // { profile, stats }
  } catch (e) { return null; }
}
function serverSave() {
  if (!TG_INIT) return;
  try {
    fetch('/api/state', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ initData: TG_INIT, action:'save', profile: S.profile || {}, stats: S.stats || {} }) }).catch(()=>{});
  } catch (e) {}
}

function completeExercise(ex) {
  const t = today();
  const s = S.stats;
  const newStreak = s.lastDate===t ? s.streak : (s.lastDate===yesterday() ? (s.streak||0)+1 : 1);
  S.stats = {
    ...s,
    streak: newStreak,
    mins: (s.mins||0) + (ex.mins||1),
    today: s.lastDate===t ? (s.today||0)+1 : 1,
    xp: (s.xp||0) + XP_PER_STEP,
    lastDate: t,
    history: [...(s.history||[]).slice(-60), { date:t, id:ex.id }],
  };
  saveStats();
  tg.HapticFeedback.notificationOccurred('success');
}

function closeEx() {

// Очередь плана может содержать упражнения ('b1') и роль-плеи ('rp:interview')
function isRpToken(t) { return typeof t === 'string' && t.indexOf('rp:') === 0; }
function rpFromToken(t) { return ROLEPLAYS.find(s => s.id === t.slice(3)); }
function planQueue() {
  const q = S.profile && Array.isArray(S.profile.queue) && S.profile.queue.length ? S.profile.queue : PLAN;
  const valid = q.filter(t => isRpToken(t) ? !!rpFromToken(t) : ALL_EX.some(e => e.id === t));
  return valid.length ? valid : PLAN;
}
// Вплетает роль-плеи в очередь упражнений: после каждых 3 техник — 1 сценарий (методология «техника → применение»)
function weaveRoleplays(exIds, answers) {
  const sit = answers && answers.situation;
  const pri = sit === 'переговоры' ? ['negotiation','raise','self']
    : sit === 'публичные выступления' ? ['self','qa','interview']
    : sit === 'видео и подкасты' ? ['self','qa','interview']
    : ['self','interview','qa'];
  const rpOrder = [...new Set([...pri, ...ROLEPLAYS.map(s => s.id)])];
  const out = []; let ri = 0;
  exIds.forEach((id, i) => {
    out.push(id);
    if ((i + 1) % 3 === 0 && ri < rpOrder.length) out.push('rp:' + rpOrder[ri++]);
  });
  if (!out.some(isRpToken) && rpOrder.length) out.splice(Math.min(2, out.length), 0, 'rp:' + rpOrder[0]);
  return out;
}
// Нормализованный шаг плана (упражнение или роль-плей)
function planStep(offset=0) {
  const q = planQueue();
  const tok = q[((S.stats.planIdx||0) + offset) % q.length];
  if (isRpToken(tok)) {
    const sc = rpFromToken(tok) || ROLEPLAYS[0];
    return { kind:'rp', id:sc.id, sc, icon:sc.icon, catName:'Сценарий общения', catBg:'var(--card)', title:sc.title, desc:sc.situation, mins:5, can:canDoRoleplay(sc.id) };
  }
  const ex = ALL_EX.find(e => e.id === tok) || ALL_EX[0];
  const cat = CATS.find(c => c.id === EX_CAT[ex.id]) || {};
  return { kind:'ex', id:ex.id, ex, icon:cat.icon, catName:cat.name, catBg:cat.bg, title:ex.title, desc:ex.desc, mins:ex.mins, can:canDo(ex.id) };
}

// ── доступ / триал / уровни (Stage 4–5) ──
function levelInfo() { const xp = S.stats.xp || 0; return { level: Math.floor(xp/100)+1, into: xp%100, xp }; }
function trialDaysLeft() {
  if (!S.profile || !S.profile.trialStart) return 0;
  return Math.max(0, Math.ceil(TRIAL_DAYS - (Date.now() - S.profile.trialStart) / 86400000));
}
function trialActive() { return trialDaysLeft() > 0; }
function isPremium() { return !!(S.profile && S.profile.premium); }   // реальная оплата — Stage 8 (Lava.top)
function hasFullAccess() { return isPremium() || trialActive(); }
function isFree(id) { return FREE_IDS.includes(id); }
function canDo(id) { return hasFullAccess() || isFree(id); }
function energyBlocked() { return !hasFullAccess() && energyLeft() <= 0; }
function paywallUrgency() {
  const ev = S.profile && S.profile.answers && S.profile.answers.event;
  if (ev === 'собеседование') return 'До собеседования каждый день на счету — подготовь голос заранее.';
  if (ev === 'выступление')   return 'Скоро выступление. Пусть голос звучит уверенно.';
  if (ev === 'переговоры')    return 'Переговоры выигрывает голос, которому доверяют.';
  return 'Занимайся каждый день и закрепи результат без ограничений.';
}
function energyLeft() { return Math.max(0, MAX_ENERGY - (S.stats.today||0)); }
function weekDots() {
  const labels = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const done = new Set((S.stats.history||[]).map(h => h.date));
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay()+6) % 7));
  return labels.map((lb, i) => {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const ds = d.toDateString();
    return { lb, isDone: done.has(ds), isToday: ds === now.toDateString() };
  });
}

  if (S.bDone) return renderDoneScreen(ex);
  const phases = S.bPhases;
  const totalSec = phases.reduce((s,p)=>s+p.dur,0) * ex.rounds;
  const elapsed = (S.bRound-1)*phases.reduce((s,p)=>s+p.dur,0) + phases.slice(0,S.bPhaseIdx).reduce((s,p)=>s+p.dur,0) + (phases[S.bPhaseIdx]?.dur||4) - S.bCountdown;
  const pct = Math.min(100, (elapsed/totalSec)*100);

  return `
  <div class="ex-screen">
    <div class="ex-hdr">
      <button class="close" id="ex-close">✕</button>
      <span style="color:#9A93A0;font-size:13px" id="breath-round">Раунд ${S.bRound} из ${ex.rounds}</span>

    </div>

    <div style="text-align:center;padding:16px 20px 0">

// ── Voice recording (MediaRecorder) ──
let mediaRec = null, mediaChunks = [], mediaStream = null, journalAudio = null, journalBtn = null;
function stopJournal() {
  if (journalAudio) { try { journalAudio.pause(); } catch (e) {} journalAudio = null; }
  if (journalBtn) { journalBtn.innerHTML = '▶'; journalBtn.classList.remove('playing'); journalBtn = null; }
}
async function startVoiceRec() {
  if (!navigator.mediaDevices?.getUserMedia) { alert('Запись недоступна в этом окружении. Можно пропустить.'); return; }
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) { alert('Нет доступа к микрофону. Можно пропустить запись.'); return; }
  mediaChunks = [];
  // выбираем формат, который реально воспроизводится на устройстве (iOS → mp4/aac, Chrome → webm)
  const recMime = (function(){
    const cands = ['audio/mp4', 'audio/webm;codecs=opus', 'audio/webm'];
    for (const c of cands) { try { if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)) return c; } catch (e) {} }
    return '';
  })();
  try { mediaRec = recMime ? new MediaRecorder(mediaStream, { mimeType: recMime }) : new MediaRecorder(mediaStream); }
  catch (e) { try { mediaRec = new MediaRecorder(mediaStream); } catch (e2) { alert('Запись не поддерживается в этом окружении.'); mediaStream.getTracks().forEach(t=>t.stop()); return; } }
  const blobType = mediaRec.mimeType || recMime || 'audio/webm';
  mediaRec.ondataavailable = e => { if (e.data && e.data.size) mediaChunks.push(e.data); };
  mediaRec.onstop = () => {
    const blob = new Blob(mediaChunks, { type: blobType });
    if (S.vUrl) URL.revokeObjectURL(S.vUrl);
    S.vUrl = URL.createObjectURL(blob);
    S.vBlob = blob;
    S.vHasRec = true;
    mediaStream?.getTracks().forEach(t => t.stop());
    render();
  };
  mediaRec.start();
  S.vRecording = true; S.vTimeLeft = 10;
  tg.HapticFeedback.impactOccurred('medium');
  render();
  S.vTimer = setInterval(() => {
    S.vTimeLeft--;
    const el = document.getElementById('rec-timer');
    if (el) el.textContent = S.vTimeLeft + 'с';
    if (S.vTimeLeft <= 0) stopVoiceRec();
  }, 1000);
}
function stopVoiceRec() {
  clearInterval(S.vTimer); S.vTimer = null;
  S.vRecording = false;
  try { if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop(); } catch (e) {}
}
function resetVoice() {
  clearInterval(S.vTimer); S.vTimer = null;
  S.vRecording = false; S.vHasRec = false; S.vBlob = null;
  if (S.vUrl) { URL.revokeObjectURL(S.vUrl); S.vUrl = null; }
}

// ── Загрузка записей в голосовой дневник (Supabase Storage через /api/voice) ──
function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(String(r.result).split(',')[1] || '');
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}
async function uploadVoice(exId, phase, blob) {
  if (!TG_INIT || !blob) return;
  try {
    const audio = await blobToBase64(blob);
    if (!audio) return;
    const mime = blob.type || 'audio/webm';
    const ext = mime.includes('mp4') || mime.includes('mpeg') ? 'm4a' : 'webm';
    fetch('/api/voice', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ initData: TG_INIT, action:'upload', exId: exId || null, phase, mime, ext, audio }) }).catch(()=>{});
    S.voices = null;   // обновить дневник при следующем заходе в Профиль
  } catch (e) {}
}
async function loadVoices() {
  if (!TG_INIT) { S.voices = []; return; }
  S.voicesLoading = true;
  try {
    const res = await fetch('/api/voice', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ initData: TG_INIT, action:'list' }) });
    S.voices = res.ok ? ((await res.json()).items || []) : [];
  } catch (e) { S.voices = []; }
  S.voicesLoading = false;
  if (S.tab === 'progress') render();
}

function advanceRecord() {
  stopVoiceRec();
  const stage = S.flowStage;
  const blob = S.vBlob;
  if (blob) uploadVoice(S.exercise && S.exercise.id, stage === 'before' ? 'before' : 'after', blob);
  resetVoice();
  if (stage === 'before') {
    S.flowStage = 'exercise';
    resetMechanic(S.exercise);
    render();
  } else {
    completeExercise(S.exercise);
    S.stats.planIdx = ((S.stats.planIdx||0) + 1) % planQueue().length;
    saveStats();
    S.flowStage = 'finish';
    render();
  }
}

async function generatePlan() {
  S.onb.step = 'loading'; render();
  const catalog = ALL_EX.map(e => ({
    id: e.id, title: e.title, cat: EX_CAT[e.id],
    catName: (CATS.find(c => c.id === EX_CAT[e.id]) || {}).name,
    diff: e.diff, mins: e.mins,
  }));
  let plan = null;
  try {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 20000);
    const res = await fetch('/api/plan', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers: S.onb.answers, catalog }), signal: ctrl.signal,
    });
    clearTimeout(to);
    if (res.ok) plan = validatePlan(await res.json());
  } catch (e) {}
  if (!plan) plan = fallbackPlan(S.onb.answers);
  if (!S.onb) return;            // пользователь мог выйти
  S.onb.plan = plan; S.onb.step = 'plan'; render();
}

function validatePlan(d) {
  if (!d || typeof d !== 'object') return null;
  const ids = new Set(ALL_EX.map(e => e.id));
  const queue = Array.isArray(d.queue) ? d.queue.filter(id => ids.has(id)) : [];
  if (queue.length < 3) return null;
  return {
    focuses: Array.isArray(d.focuses) && d.focuses.length ? d.focuses.slice(0, 2) : ['Твой голос'],
    queue,
    timeframe: d.timeframe && typeof d.timeframe === 'object' ? d.timeframe : { habit:'2–3 недели', visible:'6–8 недель', mastery:'3–4 месяца' },
    intro: typeof d.intro === 'string' && d.intro ? d.intro : 'Я собрал план под твою задачу. Начнём с основы и пойдём шаг за шагом.',
  };
}

function fallbackPlan(a) {
  const map = {
    'тихий, его плохо слышно': ['resonance','breathing'],
    'монотонный, без эмоций':  ['pace','resonance'],
    'дрожит от волнения':      ['confidence','breathing'],
    'говорю слишком быстро':   ['pace','breathing'],
    'нечёткая дикция':         ['diction','breathing'],
  };
  const focusCats = map[a.problem] || ['breathing','confidence'];
  const order = ['breathing', ...focusCats, 'diction','resonance','pace','confidence'];
  const seen = new Set(); const cats = [];
  order.forEach(c => { if (!seen.has(c)) { seen.add(c); cats.push(c); } });
  const rank = { easy:0, medium:1, hard:2 };
  let queue = [];
  cats.forEach(c => { (EX[c]||[]).slice().sort((x,y)=>rank[x.diff]-rank[y.diff]).forEach(e=>queue.push(e.id)); });
  queue = queue.slice(0, 10);
  const focuses = focusCats.map(c => (CATS.find(x => x.id === c) || {}).name).filter(Boolean);
  const fast = a.time === '20+ минут', slow = a.time === '5 минут';
  return {
    focuses,
    queue,
    timeframe: { habit: slow ? '3–4 недели' : '2–3 недели', visible: fast ? '5–6 недель' : '6–8 недель', mastery: '3–4 месяца' },
    intro: `Понял тебя. Сделаем упор на: ${focuses.join(' и ')}. Начнём с дыхательной опоры — это фундамент голоса, а дальше по нарастающей.`,
  };
}

function finishOnboarding() {
  const p = S.onb.plan;
  const wovenQueue = weaveRoleplays(p.queue, S.onb.answers);   // вплетаем роль-плеи в путь
  S.profile = { onboarded:true, answers:S.onb.answers, focuses:p.focuses, queue:wovenQueue, timeframe:p.timeframe, trialStart:Date.now() };
  store.set('rezon_profile', JSON.stringify(S.profile));
  S.stats.planIdx = 0; saveStats();
  S.onb = null; S.tab = 'home'; tg.BackButton.hide();
  resetVoice();
  tg.HapticFeedback.notificationOccurred('success');
  render();
}

// WAVE ANIMATION
// ═══════════════════════════════════════════
let waveFrame = null;
function startWave() {
  const c = document.getElementById('wave'); if(!c) return;
  const ctx = c.getContext('2d');
  c.width = c.offsetWidth; c.height = 52;
  let t = 0;
  const waves = [
    { a:13, f:0.035, s:1.8, col:'rgba(232,93,67,0.65)' },
    { a:8,  f:0.055, s:2.4, col:'rgba(255,177,153,0.45)' },
    { a:5,  f:0.075, s:1.4, col:'rgba(255,159,69,0.35)' },
  ];
  cancelAnimationFrame(waveFrame);
  (function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    waves.forEach(w=>{
      ctx.beginPath(); ctx.strokeStyle=w.col; ctx.lineWidth=2;
      for(let x=0;x<=c.width;x+=2){
        const y=26+w.a*Math.sin(w.f*x+t*w.s*0.02);
        x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
    });
    t++;
    waveFrame = requestAnimationFrame(draw);
  })();
}

// ═══════════════════════════════════════════
function startBreathing() {
  S.bRunning = true;
  render();
  applyBreathPhase();

  S.bTimer = setInterval(()=>{
    S.bCountdown--;
    const numEl = document.getElementById('breath-num');
    if (numEl) numEl.textContent = S.bCountdown;

    if (S.bCountdown <= 0) {
      S.bPhaseIdx = (S.bPhaseIdx+1) % S.bPhases.length;
      if (S.bPhaseIdx === 0) {
        S.bRound++;
        if (S.bRound > S.exercise.rounds) {
          clearInterval(S.bTimer);
          if (S.flowStage === 'exercise') { S.flowStage = 'after'; resetVoice(); render(); return; }
          S.bDone = true;
          render();
          return;
        }
        const roundEl = document.getElementById('breath-round');
        if (roundEl) roundEl.textContent = `Раунд ${S.bRound} из ${S.exercise.rounds}`;
      }
      S.bCountdown = S.bPhases[S.bPhaseIdx].dur;
      applyBreathPhase();
    }
  }, 1000);
}

function applyBreathPhase() {
  const phase = S.bPhases[S.bPhaseIdx];
  if (!phase) return;
  const circle = document.getElementById('breath-circle');
  if (circle) {
    circle.style.transition = `transform ${phase.dur}s ease-in-out, border-color .5s, box-shadow .5s, background .5s`;
    circle.style.transform = `scale(${phase.scale})`;
    circle.style.borderColor = phase.color;
    circle.style.boxShadow = `0 0 40px ${phase.color}50, 0 0 80px ${phase.color}25`;
    circle.style.background = `${phase.color}12`;
    const phEl = circle.querySelector('#breath-phase');
    const nmEl = circle.querySelector('#breath-num');
    if (phEl) { phEl.textContent = phase.name; phEl.style.color = phase.color; }
    if (nmEl) { nmEl.textContent = S.bCountdown; nmEl.style.color = phase.color; }
  }
  // Update dots
  S.bPhases.forEach((_,i)=>{
    const dot = document.querySelectorAll('.b-dot')[i];
    const durEl = document.querySelectorAll('.b-dot-dur')[i];
    if (!dot) return;
    dot.classList.toggle('on', i===S.bPhaseIdx);
    if (i===S.bPhaseIdx) {
      dot.style.background = S.bPhases[i].color;
      dot.style.color = S.bPhases[i].color;
      if(durEl) durEl.style.color = S.bPhases[i].color;
    } else {
      dot.style.background = '';
      if(durEl) durEl.style.color = '';
    }
  });
  tg.HapticFeedback.impactOccurred('light');
}

// Speech recognition
let recog = null;
function startRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Распознавание речи не поддерживается. Попробуйте в Chrome.'); return; }
  recog = new SR();
  recog.lang = 'ru-RU'; recog.continuous = true; recog.interimResults = true;
  recog.onresult = e => {
    S.tTranscript = Array.from(e.results).map(r=>r[0].transcript).join(' ');
    const el = document.querySelector('.transcript p:last-child');
    if (el) el.textContent = S.tTranscript;
  };
  recog.start(); S.tRecording = true;
  tg.HapticFeedback.impactOccurred('medium');
}
function stopRec() {
  recog?.stop(); recog = null; S.tRecording = false;
  tg.HapticFeedback.impactOccurred('light');
}

function nextRound() {
  S.tTranscript = '';
  if (S.tRound >= (S.exercise.rounds||1)) {
    if (S.flowStage === 'exercise') { S.flowStage = 'after'; resetVoice(); render(); return; }
    S.tDone = true;
  } else {
    S.tRound++;
    S.tTimeLeft = S.exercise.dur||60;
    if (S.exercise.type==='guided') startGuidedTimer();
  }
  render();
}

async function buildScenario(description) {
  description = (description||'').trim();
  if (description.length < 8) { document.getElementById('build-input')?.focus(); return; }
  S.rpBuild = { generating:true, error:false }; render();
  let data = null;
  try {
    const res = await fetch('/api/roleplay', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ messages:[{ role:'user', content:description }], phase:'build' }) });
    if (res.ok) data = await res.json();
  } catch(e) {}
  if (!data || !data.opener) { S.rpBuild = { generating:false, error:true }; render(); return; }
  const p = data.persona || {};
  const sc = {
    id:'custom', icon:'✨', custom:true,
    title: data.title || 'Твоя ситуация',
    name: p.name || 'Собеседник', roleTitle: p.role || '', face: p.face || '🧑', faceBg:'#E85D43',
    situation: data.situation || description,
    role: p.agenda || p.role || 'собеседник в этой ситуации',
    opener: data.opener,
    mode: ['persuade','difficult','connect','support'].includes(data.mode) ? data.mode : 'persuade',
  };
  S.rpBuild = null;
  openRoleplay(sc, false);
}

async function startCall() {
  const rp = S.roleplay; if (!rp) return;
  rp.phase = 'call'; rp.callStatus = 'connecting'; render();
  try {
    rp.stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
  } catch(e) {
    try { rp.stream = await navigator.mediaDevices.getUserMedia({ audio:true }); rp.noCam = true; }
    catch(e2) { rp.stream = null; rp.noMedia = true; }
  }
  if (!S.roleplay) return;
  rp.callStatus = 'idle'; render();      // показывает экран + цепляет самовью
  speakAI(rp.sc.opener);                  // Алмат озвучивает первую реплику
}

function speakAI(text) {
  const rp = S.roleplay; if (!rp) return;
  rp.callStatus = 'speaking'; updateCallUI();
  const synth = window.speechSynthesis;
  let done = false;
  const finish = () => { if (done) return; done = true; if (S.roleplay) { S.roleplay.callStatus = 'idle'; updateCallUI(); } };
  // страховка: вернуть «idle», даже если синтез не вызовет onend (бывает в некоторых вебвью)
  const fallbackMs = Math.max(2500, (text || '').length * 70) + 1500;
  if (!synth) { setTimeout(finish, fallbackMs); return; }
  try {
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ru-RU'; u.rate = 1.0;
    const ru = (synth.getVoices() || []).find(v => /ru/i.test(v.lang));
    if (ru) u.voice = ru;
    u.onend = finish; u.onerror = finish;
    synth.speak(u);
    setTimeout(finish, fallbackMs);
  } catch(e) { finish(); }
}

function callListen() {
  const rp = S.roleplay; if (!rp) return;
  if (rp.callStatus === 'speaking') { try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch(e){} rp.callStatus='idle'; updateCallUI(); return; }
  if (rp.callStatus === 'thinking') return;
  if (rp.callStatus === 'listening') { try { rpRecog && rpRecog.stop(); } catch(e){} return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Голосовой ввод недоступен в этом браузере — напиши ответ в поле ниже.'); return; }
  rpRecog = new SR(); rpRecog.lang = 'ru-RU'; rpRecog.interimResults = true; rpRecog.continuous = false;
  let finalText = '';
  rpRecog.onresult = e => { finalText = Array.from(e.results).map(r=>r[0].transcript).join(' '); const s=document.getElementById('call-sub'); if(s) s.textContent = finalText; };
  rpRecog.onerror = () => { S.rpRecording=false; if(S.roleplay){ S.roleplay.callStatus='idle'; updateCallUI(); } };
  rpRecog.onend = () => { S.rpRecording=false; if (finalText.trim()) callSend(finalText.trim()); else if (S.roleplay) { S.roleplay.callStatus='idle'; updateCallUI(); } };
  try { rpRecog.start(); } catch(e) { return; }
  S.rpRecording = true; rp.callStatus = 'listening'; updateCallUI();
}

// payload сценария для API (для совещания добавляет personas + опенер-текст)
function rpScenario(rp) {
  const sc = rp.sc;
  const o = {
    situation: sc.situation,
    role: sc.role || (sc.personas ? 'участники делового совещания' : ''),
    opener: sc.personas ? (sc.opener && sc.opener.text) : sc.opener,
    mode: sc.mode || 'persuade',
  };
  if (sc.personas) o.personas = sc.personas.map(p => ({ id:p.id, name:p.name, role:p.role, agenda:p.agenda }));
  return o;
}
// история для API (реплики участников тегируем именем — для непрерывности совещания)
function rpApiMessages(rp) {
  return rp.msgs.slice(1).map(m => {
    if (m.role === 'assistant' && rp.sc.personas && m.speaker) {
      const p = rp.sc.personas.find(x => x.id === m.speaker);
      return { role:'assistant', content: (p ? `[${p.name}]: ` : '') + m.text };
    }
    return { role:m.role, content:m.text };
  });
}
function rpSpeakerName(rp, id) { const p = rp.sc.personas && rp.sc.personas.find(x => x.id === id); return p ? p.name : ''; }

async function callSend(text) {
  text = (text||'').trim(); const rp = S.roleplay; if (!text || !rp) return;
  rp.msgs.push({ role:'user', text });
  rp.callStatus = 'thinking'; updateCallUI();
  try {
    const res = await fetch('/api/roleplay', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ scenario: rpScenario(rp), messages: rpApiMessages(rp), phase:'converse' }) });
    if (!res.ok) throw new Error('http');
    const data = await res.json();
    rp.msgs.push({ role:'assistant', text:data.text || '…', speaker:data.speaker });
    speakAI(data.text || '');
  } catch(e) {
    rp.msgs.push({ role:'assistant', text:'(связь прервалась — попробуй ещё раз)' });
    rp.callStatus = 'idle'; updateCallUI();
  }
}

function updateCallUI() {
  const rp = S.roleplay; if (!rp || rp.phase !== 'call') return;
  if (rp.sc.personas) { render(); return; }   // совещание — перерисовываем всю сетку
  const st = document.getElementById('call-status'); if (st) st.textContent = CALL_STATUS[rp.callStatus] || '';
  const av = document.getElementById('call-avatar'); if (av) av.classList.toggle('speaking', rp.callStatus==='speaking');
  const mic = document.getElementById('call-mic'); if (mic) { mic.classList.toggle('on', rp.callStatus==='listening'); mic.textContent = rp.callStatus==='listening' ? '⏹' : '🎤'; }
  const sub = document.getElementById('call-sub');
  if (sub) {
    if (rp.callStatus === 'thinking') sub.textContent = '…';
    else if (rp.callStatus === 'speaking') { const a=[...rp.msgs].reverse().find(m=>m.role==='assistant'); if(a) sub.textContent=a.text; }
  }
  // показать кнопку «Завершить», как только появился первый ответ пользователя
  if (rp.msgs.some(m=>m.role==='user') && !document.getElementById('call-end')) render();
}

function stopCallMedia() {
  try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch(e){}
  if (S.rpRecording) { try { rpRecog && rpRecog.stop(); } catch(e){} S.rpRecording = false; }
  const rp = S.roleplay;
  if (rp && rp.stream) { try { rp.stream.getTracks().forEach(t=>t.stop()); } catch(e){} rp.stream = null; }
}

// ── Алмат-коуч «в углу ринга»: быстрый совет по ходу разговора ──
function coachOverlayHtml(rp) {
  if (rp.coachLoading) return `<div class="coach-tip">💡 <b>Алмат думает…</b></div>`;
  if (rp.coachTip) return `<div class="coach-tip" id="coach-tip">💡 <b>Алмат:</b> ${rp.coachTip} <span style="color:var(--muted);font-size:11px">· скрыть</span></div>`;
  return '';
}
async function coachAsk() {
  const rp = S.roleplay; if (!rp || rp.coachLoading) return;
  rp.coachLoading = true; rp.coachTip = null; render();
  const transcript = rp.msgs.map(m => m.role==='user' ? 'Я: '+m.text : ((rpSpeakerName(rp,m.speaker)||'Собеседник')+': '+m.text)).join('\n');
  try {
    const res = await fetch('/api/roleplay', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ scenario: rpScenario(rp), messages:[{ role:'user', content:'Диалог пока:\n'+transcript+'\n\nДай совет для моей следующей реплики.' }], phase:'coach' }) });
    const data = await res.json();
    rp.coachTip = (res.ok && data.text) ? data.text : 'Совет недоступен — попробуй ещё раз.';
  } catch(e) { rp.coachTip = 'Совет недоступен — проверь связь.'; }
  rp.coachLoading = false; render();
}
function coachDismiss() { if (S.roleplay) { S.roleplay.coachTip = null; render(); } }

function openRoleplay(sc, fromPlan=false) {
  if (!canDoRoleplay(sc.id)) { showSubModal('exercise'); return; }
  if (energyBlocked()) { showSubModal('energy'); return; }
  clearTimers();
  const openerText = sc.personas ? (sc.opener && sc.opener.text) : sc.opener;
  const openerSpeaker = sc.personas ? (sc.opener && sc.opener.speaker) : undefined;
  S.roleplay = { sc, msgs:[{ role:'assistant', text:openerText, speaker:openerSpeaker }], phase:'intro', loading:false, feedback:null, fromPlan };
  tg.BackButton.show();
  render();
}

function exitRoleplay() {
  const fromPlan = S.roleplay && S.roleplay.fromPlan;
  stopCallMedia();
  S.roleplay = null;
  if (fromPlan) { S.catId = null; S.tab = 'home'; tg.BackButton.hide(); }   // назад на «Сегодня»
  else { S.catId = 'roleplay'; tg.BackButton.show(); }                       // назад к списку сценариев
  render();
}

async function sendRoleplay(text) {
  text = (text||'').trim();
  const rp = S.roleplay;
  if (!text || !rp || rp.loading) return;
  rp.msgs.push({ role:'user', text });
  rp.loading = true; render();
  try {
    const res = await fetch('/api/roleplay', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ scenario: rpScenario(rp), messages: rpApiMessages(rp), phase:'converse' }),
    });
    if (!res.ok) throw new Error('http');
    const data = await res.json();
    rp.msgs.push({ role:'assistant', text:data.text || '…', speaker:data.speaker });
  } catch(e) {
    rp.msgs.push({ role:'assistant', text:'⚠️ Не удалось ответить (проверь связь). Попробуй ещё раз или заверши разбор.' });
  }
  rp.loading = false; render();
}

async function finishRoleplay() {
  const rp = S.roleplay; if (!rp) return;
  stopCallMedia();
  rp.phase = 'loading'; render();
  const transcript = rp.msgs.map(m => m.role==='user' ? 'Я: '+m.text : ((rpSpeakerName(rp, m.speaker)||'Собеседник')+': '+m.text)).join('\n');
  try {
    const res = await fetch('/api/roleplay', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ scenario: rpScenario(rp), messages:[{ role:'user', content:'Вот диалог тренировки:\n'+transcript+'\n\nРазбери, как я (реплики «Я:») общался.' }], phase:'feedback' }),
    });
    if (!res.ok) throw new Error('http');
    const data = await res.json();
    rp.result = {
      outcome: data.outcome || 'Разговор завершён',
      outcomeEmoji: data.outcomeEmoji || '✅',
      scores: Array.isArray(data.scores) ? data.scores : null,
      feedback: data.feedback || 'Не удалось получить разбор.',
    };
  } catch(e) {
    rp.result = { outcome:'Разговор завершён', outcomeEmoji:'⚠️', scores:null,
      feedback:'⚠️ Не удалось получить разбор — проверь соединение и попробуй ещё раз.' };
  }
  completeExercise({ id:'rp:'+rp.sc.id, mins:3 });   // XP + стрик + история
  if (rp.fromPlan) { S.stats.planIdx = ((S.stats.planIdx||0) + 1) % planQueue().length; saveStats(); }
  rp.phase = 'feedback'; render();
}

let rpRecog = null;
function rpMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const inp = document.getElementById('rp-input');
  if (!SR) { alert('Голосовой ввод не поддерживается в этом браузере — печатай ответ.'); return; }
  if (S.rpRecording) { try { rpRecog && rpRecog.stop(); } catch(e){} return; }
  rpRecog = new SR(); rpRecog.lang = 'ru-RU'; rpRecog.interimResults = true; rpRecog.continuous = true;
  const base = inp ? inp.value : '';
  rpRecog.onresult = e => { const t = Array.from(e.results).map(r=>r[0].transcript).join(' '); if (inp) inp.value = (base?base+' ':'') + t; };
  rpRecog.onerror = () => { S.rpRecording=false; const b=document.getElementById('rp-mic'); if(b) b.textContent='🎤'; };
  rpRecog.onend   = () => { S.rpRecording=false; const b=document.getElementById('rp-mic'); if(b) b.textContent='🎤'; };
  try { rpRecog.start(); } catch(e) { return; }
  S.rpRecording = true; const b=document.getElementById('rp-mic'); if(b) b.textContent='⏹';
  tg.HapticFeedback.impactOccurred('medium');
}

function bindRoleplay() {
  const phase = S.roleplay ? S.roleplay.phase : null;
  document.getElementById('rp-close')?.addEventListener('click', exitRoleplay);
  // intro
  document.getElementById('rp-callstart')?.addEventListener('click', startCall);
  document.getElementById('rp-textstart')?.addEventListener('click', () => { S.roleplay.phase='chat'; render(); });
  // call
  document.getElementById('call-mic')?.addEventListener('click', callListen);
  document.getElementById('call-end')?.addEventListener('click', finishRoleplay);
  // Алмат-коуч
  document.getElementById('coach-btn')?.addEventListener('click', coachAsk);
  document.getElementById('coach-tip')?.addEventListener('click', coachDismiss);
  // chat
  document.getElementById('rp-mic')?.addEventListener('click', rpMic);
  document.getElementById('rp-finish')?.addEventListener('click', finishRoleplay);
  // feedback
  document.getElementById('rp-again')?.addEventListener('click', () => openRoleplay(S.roleplay.sc, S.roleplay.fromPlan));
  document.getElementById('rp-done')?.addEventListener('click', exitRoleplay);
  // текстовый ввод (и в чате, и в звонке)
  const inp = document.getElementById('rp-input');
  const send = document.getElementById('rp-send');
  if (send && inp) {
    const doSend = () => { const v=inp.value; inp.value=''; if (phase==='call') callSend(v); else sendRoleplay(v); };
    send.addEventListener('click', doSend);
    inp.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } });
  }
}

// ═══════════════════════════════════════════
// SUBSCRIPTION MODAL
// ═══════════════════════════════════════════
function showSubModal(context) {
  const heads = {
    plan:     'Открой свой полный план',
    energy:   'Хочешь заниматься больше?',
    exercise: 'Это упражнение — в подписке',
  };
  const head = heads[context] || 'Полный доступ к Rezon';
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:flex-end;max-width:430px;margin:0 auto;';
  modal.innerHTML = `
    <div style="background:var(--card);border-radius:24px 24px 0 0;padding:24px 20px calc(34px + env(safe-area-inset-bottom));width:100%;border:1px solid var(--border)">
      <div style="text-align:center;font-size:34px;margin-bottom:4px">🚀</div>
      <h2 style="text-align:center;font-size:20px;font-weight:800;margin-bottom:6px">${head}</h2>
      <p style="text-align:center;color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:18px">${paywallUrgency()}</p>
      <div class="sub-card">
        <div class="price">${PRICE}</div>
        <div class="price-sub">в месяц · отмена в любой момент</div>
        <div class="feature-list">
          ${['Полный персональный план','Все упражнения без лимитов','AI-коуч без ограничений','Голосовой дневник до/после','Новые упражнения каждую неделю'].map(f=>`<div class="feature-item">✅ ${f}</div>`).join('')}
        </div>
      </div>
      <button class="btn btn-p" id="sub-confirm">Оформить за ${PRICE}/мес</button>
      <button class="btn" style="background:none;color:var(--muted);margin-top:8px" id="sub-close">Позже</button>
    </div>`;
  document.body.appendChild(modal);
  tg.HapticFeedback.impactOccurred('medium');
  const close = () => modal.remove();
  modal.addEventListener('click', e => { if (e.target === modal) close(); });
  document.getElementById('sub-close')?.addEventListener('click', close);
  document.getElementById('sub-confirm')?.addEventListener('click', () => {
    alert('💳 Здесь подключим оплату Lava.top (этап 8). Подписка пока в разработке.');
    close();
  });
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init() {
  await loadStats();
  await loadProfile();
  // подтягиваем серверный прогресс (если запущены в Telegram)
  const srv = await serverLoad();
  if (srv) {
    const srvS = srv.stats || {};
    // берём серверные статы, только если они не «беднее» локальных (по XP) — чтобы не потерять прогресс
    if (Object.keys(srvS).length && (srvS.xp||0) >= (S.stats.xp||0)) {
      if (srvS.lastDate !== today() && srvS.lastDate !== yesterday()) srvS.streak = 0;
      if (srvS.lastDate !== today()) srvS.today = 0;
      S.stats = srvS;
    }
    if (srv.profile && srv.profile.onboarded) S.profile = srv.profile;
    serverSave();   // синхронизируем итоговое состояние обратно
  }
  if (!S.profile || !S.profile.onboarded) S.onb = { step:'intro', answers:{}, plan:null };
  render();
}

init();

})();
