<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rezon — голос, речь, уверенность</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1C1A22; --card: #28252F; --border: #38343F;
      --primary: #E85D43; --gold: #FF9F45; --green: #4ADE80;
      --pink: #FF7A5C; --purple: #FFB199;
      --text: #FFFFFF; --muted: #9A93A0; --dim: #6E6676;
      --secondary: #FFB199; --coral-1: #FF7A5C; --coral-3: #C9492F;
      --nav-bg: #161419;
      --grad: linear-gradient(135deg,#FF7A5C 0%,#E85D43 55%,#C9492F 100%);
      --font-head: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--font-body);
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      max-width: 430px; margin: 0 auto;
    }
    ::-webkit-scrollbar { display: none; } * { scrollbar-width: none; }

    h1, h2, h3, .page-title, .stat-v, .price, .cat-name, .lbl, .nav-label, #breath-num { font-family: var(--font-head); }

    /* NAV */
    .nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: #161419; border-top: 1px solid var(--border);
      display: flex; padding: 8px 0 calc(16px + env(safe-area-inset-bottom)); z-index: 100;
    }
    .nav-btn { flex: 1; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 0; }
    .nav-icon { font-size: 20px; }
    .nav-label { font-size: 10px; font-weight: 600; color: var(--dim); }
    .nav-label.on { color: var(--primary); }

    /* SCREENS */
    .screen { padding-bottom: 84px; }
    .hero { background: linear-gradient(180deg,#211E29 0%,var(--bg) 100%); padding: 52px 20px 20px; }
    #wave { width: 100%; height: 52px; display: block; }

    /* CARDS */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
    .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* BUTTONS */
    .btn { display: block; width: 100%; padding: 15px 24px; border: none; border-radius: 16px; font-size: 15px; font-weight: 700; color: white; cursor: pointer; text-align: center; font-family: inherit; transition: opacity .15s; }
    .btn:active { opacity: .8; }
    .btn-p { background: var(--grad); box-shadow: 0 6px 18px rgba(232,93,67,.32); }
    .btn-g { background: var(--green); }
    .btn-pk { background: var(--pink); }
    .btn-r { background: #EF4444; }
    .btn-d { background: var(--dim); }
    .btn-sm { width: auto; padding: 6px 12px; font-size: 12px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); color: var(--muted); }

    /* SECTION LABEL */
    .lbl { color: var(--primary); font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }

    /* STAT */
    .stats-row { display: flex; gap: 10px; }
    .stat { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 10px; text-align: center; }
    .stat-v { font-size: 22px; font-weight: 800; line-height: 1.1; }
    .stat-l { font-size: 9px; font-weight: 600; color: var(--dim); margin-top: 2px; text-transform: uppercase; letter-spacing: .05em; }

    /* EXERCISE CARD */
    .ex-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; margin-bottom: 10px; transition: border-color .15s; }
    .ex-card:active { border-color: var(--primary); }
    .ex-ico { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .ex-info { flex: 1; min-width: 0; }
    .ex-title { font-size: 14px; font-weight: 600; }
    .ex-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .ex-meta { flex-shrink: 0; text-align: right; }
    .ex-time { font-size: 11px; color: var(--muted); }
    .ex-diff { font-size: 10px; font-weight: 600; margin-top: 3px; }
    .d-e { color: var(--green); } .d-m { color: var(--gold); } .d-h { color: #EF4444; }

    /* CAT CARD */
    .cat-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px 16px; cursor: pointer; transition: border-color .15s; }
    .cat-card:active { border-color: var(--primary); }
    .cat-icon { font-size: 28px; margin-bottom: 10px; }
    .cat-name { font-size: 15px; font-weight: 700; }
    .cat-desc { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .cat-cnt { font-size: 11px; font-weight: 700; margin-top: 10px; }

    /* BACK BTN */
    .back { color: var(--primary); background: none; border: none; font-size: 14px; cursor: pointer; font-weight: 600; padding: 0; margin-bottom: 16px; font-family: inherit; }

    /* FULL SCREEN EXERCISE */
    .ex-screen { background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200; overflow-y: auto; }
    .ex-hdr { padding: 52px 20px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
    .progress-bar { background: var(--border); border-radius: 4px; height: 3px; margin: 0 20px 0; }
    .progress-fill { height: 3px; border-radius: 4px; background: var(--primary); transition: width 1s linear; }
    .ex-body { flex: 1; padding: 0 20px 24px; display: flex; flex-direction: column; }

    /* TEXT BLOCK */
    .text-block { background: linear-gradient(135deg,#2A2730,#211E29); border: 1px solid var(--border); border-radius: 18px; padding: 24px; flex: 1; margin-bottom: 14px; }
    .read-text { color: var(--text); font-size: 18px; line-height: 1.85; font-weight: 600; white-space: pre-line; letter-spacing: .02em; }

    /* BREATHING */
    .breath-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #breath-circle {
      width: 150px; height: 150px; border-radius: 50%;
      border: 3px solid var(--primary); display: flex; flex-direction: column; align-items: center; justify-content: center;
      transform: scale(0.7);
    }
    #breath-num { font-size: 38px; font-weight: 800; line-height: 1; color: var(--primary); }
    #breath-phase { font-size: 14px; font-weight: 600; margin-top: 6px; color: var(--primary); }
    .breath-dots { display: flex; gap: 20px; margin-top: 64px; }
    .b-dot-wrap { text-align: center; }
    .b-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); margin: 0 auto 5px; transition: background .3s; }
    .b-dot.on { box-shadow: 0 0 8px currentColor; }
    .b-dot-dur { font-size: 10px; font-weight: 600; color: var(--dim); }
    .b-dot-name { font-size: 9px; color: var(--dim); }

    /* DONE */
    .done-screen { background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; position: fixed; top:0;left:0;right:0;bottom:0;z-index:300; }

    /* TRANSCRIPT */
    .transcript { background: #211E29; border-radius: 12px; padding: 14px; margin-bottom: 14px; }

    /* COACH */
    .coach-screen { display: flex; flex-direction: column; height: 100vh; position: fixed; top:0;left:0;right:0;bottom:0;z-index:50;background:var(--bg); max-width:430px;margin:0 auto; }
    .chat-msgs { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .msg { display: flex; margin-bottom: 12px; }
    .msg-r { justify-content: flex-end; }
    .msg-l { justify-content: flex-start; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; margin-right: 8px; flex-shrink: 0; align-self: flex-end; }
    .bubble { max-width: 78%; padding: 11px 15px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; }
    .bubble-u { background: var(--primary); border-radius: 18px 18px 4px 18px; color: white; }
    .bubble-b { background: var(--card); border: 1px solid var(--border); border-radius: 18px 18px 18px 4px; color: var(--text); }
    .chat-inp-area { padding: 10px 20px calc(20px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .chat-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .chat-inp { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; font-family: inherit; }
    .chat-inp:focus { border-color: var(--primary); }
    .chat-send { background: var(--primary); border: none; border-radius: 14px; padding: 0 18px; color: white; font-size: 20px; cursor: pointer; }
    .quick-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }

    /* HEATMAP */
    .heatmap { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }
    .hm-cell { aspect-ratio: 1; border-radius: 5px; background: var(--border); opacity: .4; }
    .hm-cell.on { background: var(--primary); box-shadow: 0 0 8px rgba(232,93,67,.5); opacity: 1; }

    /* ACHIEVEMENTS */
    .ach { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; opacity: .35; }
    .ach.done { opacity: 1; }
    .ach-ico { width: 42px; height: 42px; border-radius: 11px; background: #211E29; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .ach.done .ach-ico { background: #2E2228; border-color: var(--primary); }

    /* DOTS ANIMATION */
    @keyframes dp { 0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)} }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); display: inline-block; animation: dp 1.4s ease-in-out infinite; }

    /* UTILITIES */
    h1.page-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    p.page-sub { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    .gap-10 { display: flex; flex-direction: column; gap: 10px; }
    .row-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .link { color: var(--primary); background: none; border: none; font-size: 13px; cursor: pointer; font-weight: 600; font-family: inherit; }
    .mt { margin-top: auto; padding-top: 8px; }
    .text-center { text-align: center; }
    .tip-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-top: 16px; }

    /* SUBSCRIPTION CARD */
    .sub-card { background: linear-gradient(135deg,#33231E,#2A1D1A); border: 1px solid var(--primary); border-radius: 20px; padding: 24px; text-align: center; margin-bottom: 16px; }
    .price { font-size: 42px; font-weight: 900; background: var(--grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .price-sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .feature-list { text-align: left; margin-bottom: 20px; }
    .feature-item { color: var(--text); font-size: 14px; padding: 6px 0; }
  </style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#E85D43;font-size:36px;">🎤</div>
</div>

<script>
(function() {
'use strict';

// ═══════════════════════════════════════════
// TELEGRAM SETUP
// ═══════════════════════════════════════════
const tg = window.Telegram?.WebApp || {
  ready:()=>{}, expand:()=>{},
  HapticFeedback:{ impactOccurred:()=>{}, notificationOccurred:()=>{} },
  MainButton:{ show:()=>{}, hide:()=>{}, setText:()=>{}, onClick:()=>{}, offClick:()=>{}, isVisible:false },
  BackButton:{ show:()=>{}, hide:()=>{}, onClick:()=>{}, offClick:()=>{} },
  initDataUnsafe:{}, themeParams:{}, close:()=>{}, sendData:()=>{},
};
tg.ready();
tg.expand();

const user = tg.initDataUnsafe?.user;
const userName = user?.first_name || 'друг';

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const CATS = [
  { id:'breathing', name:'Дыхание',     icon:'🌊', color:'#E85D43', bg:'#2E2228', desc:'Основа голоса'     },
  { id:'diction',   name:'Дикция',       icon:'🎯', color:'#FF7A5C', bg:'#2E2228', desc:'Чёткость речи'     },
  { id:'resonance', name:'Резонанс',     icon:'🎵', color:'#FF9F45', bg:'#2E2228', desc:'Сила звука'         },
  { id:'pace',      name:'Темп',          icon:'⏱️', color:'#4ADE80', bg:'#1E261F', desc:'Ритм и паузы'      },
  { id:'confidence',name:'Уверенность',  icon:'⚡', color:'#FFB199', bg:'#2E2228', desc:'Внутренняя сила'   },
];

const EX = {
  breathing: [
    { id:'b1', title:'Диафрагмальное',   desc:'Основа мощного голоса',             type:'breathing', pattern:{inhale:4,hold:4,exhale:6,pause:2}, rounds:5, diff:'easy', mins:3 },
    { id:'b2', title:'Дыхание 4-7-8',    desc:'Снимает тревогу перед выступлением', type:'breathing', pattern:{inhale:4,hold:7,exhale:8,pause:1}, rounds:4, diff:'medium', mins:3 },
    { id:'b3', title:'Ступенчатое',       desc:'Развивает объём лёгких',             type:'breathing', pattern:{inhale:3,hold:3,exhale:6,pause:2}, rounds:6, diff:'hard', mins:4 },
  ],
  diction: [
    { id:'d1', title:'Скороговорка: Корабли', desc:'Сонорные Р и Л', type:'speech', text:'Корабли лавировали-лавировали, да не вылавировали.', inst:'Начните медленно. С каждым повтором ускоряйтесь, не теряя чёткость.', rounds:5, diff:'easy', mins:2 },
    { id:'d2', title:'Скороговорка: Бык',     desc:'Взрывные Б и П', type:'speech', text:'Бык тупогуб, тупогубенький бычок, у быка бела губа была тупа.', inst:'Следите за чёткостью каждого Б и П.', rounds:5, diff:'medium', mins:2 },
    { id:'d3', title:'Шипящие: Саша',         desc:'Чёткое Ш и С',  type:'speech', text:'Шла Саша по шоссе и сосала сушку.', inst:'Не смешивайте Ш и С — это разные звуки.', rounds:5, diff:'easy', mins:1 },
    { id:'d4', title:'Гласные нараспев',       desc:'Разогрев артикуляции', type:'speech', text:'А — Э — И — О — У', inst:'Каждую гласную тяните 3 секунды. Ощущайте движение губ.', rounds:5, diff:'easy', mins:2 },
  ],
  resonance: [
    { id:'r1', title:'Мычание на М',           desc:'Пробуждает грудной резонатор', type:'guided', inst:'Закройте рот, расслабьте челюсть. Тяните звук М. Положите ладонь на грудь — почувствуйте вибрацию. Направляйте звук в грудь.', dur:90, diff:'easy', mins:2 },
    { id:'r2', title:'Вибрация губ',            desc:'Расслабляет голосовой аппарат', type:'guided', inst:'Сомкните губы и выдыхайте воздух — губы вибрируют как пропеллер. Добавьте голос. Снимает напряжение с гортани.', dur:60, diff:'easy', mins:1 },
  ],
  pace: [
    { id:'p1', title:'Сила паузы',       desc:'Пауза — это власть, не слабость', type:'guided', inst:'Прочитайте любой текст вслух. На каждой точке — стоп. Считайте: раз-и-два. Только потом продолжайте.', dur:120, diff:'medium', mins:2 },
    { id:'p2', title:'Замедление ×2',    desc:'Медленная речь — признак уверенности', type:'guided', inst:'Расскажите о своём дне в 2 раза медленнее обычного. Чувствуете неловкость? Слушатель воспринимает это как уверенность.', dur:90, diff:'medium', mins:2 },
  ],
  confidence: [
    { id:'c1', title:'Голос силы',       desc:'Включи уверенный голос за 2 минуты', type:'guided', inst:'Встаньте. Плечи назад. Нить тянет макушку вверх. Глубокий вдох. Произнесите низким голосом: «Я говорю ясно. Меня слышат. Я убеждаю.» Три раза.', dur:120, diff:'easy', mins:2 },
    { id:'c2', title:'Аффирмации',       desc:'Перепрограммируй внутренний голос', type:'speech', text:'Мой голос — это моя сила.\nЯ говорю ясно и убедительно.\nМои слова важны.\nЛюди хотят меня слушать.', inst:'Каждую фразу произносите с убеждением. Не вопрос — факт.', rounds:3, diff:'easy', mins:2 },
  ],
};

const ALL_EX = Object.values(EX).flat();

const TIPS = [
  'Перед важным звонком — 3 глубоких вдоха. Это физическая подготовка голоса.',
  'Говорите со скоростью 120–150 слов в минуту для максимальной ясности.',
  'Пауза перед ответом — признак уверенности, не слабости.',
  'Улыбайтесь, когда говорите по телефону — это слышно в голосе.',
  'Рот открыт шире, чем кажется нужным — ключ к чёткой дикции.',
  'Говорите на выдохе. Вдыхайте между мыслями, не в середине предложения.',
  'Понизьте голос в конце фразы — это звучит уверенно, не вопрошающе.',
];

function buildPhases(pattern) {
  const p = [];
  if (pattern.inhale) p.push({ name:'Вдох',    dur:pattern.inhale, color:'#E85D43', scale:1.35 });
  if (pattern.hold)   p.push({ name:'Задержка', dur:pattern.hold,   color:'#FFB199', scale:1.35 });
  if (pattern.exhale) p.push({ name:'Выдох',   dur:pattern.exhale, color:'#4ADE80', scale:0.65 });
  if (pattern.pause)  p.push({ name:'Пауза',    dur:pattern.pause,  color:'#6E6676', scale:0.65 });
  return p;
}

// ═══════════════════════════════════════════
// STORAGE (CloudStorage + localStorage fallback)
// ═══════════════════════════════════════════
const store = {
  get(key) {
    return new Promise(resolve => {
      const local = localStorage.getItem(key);
      if (tg.CloudStorage?.getItem) {
        tg.CloudStorage.getItem(key, (e, v) => resolve((e || !v) ? local : v));
      } else resolve(local);
    });
  },
  set(key, val) {
    localStorage.setItem(key, val);
    if (tg.CloudStorage?.setItem) tg.CloudStorage.setItem(key, val, () => {});
  }
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let S = {
  tab: 'home',
  catId: null,
  exercise: null,
  // breathing
  bPhases: [], bPhaseIdx: 0, bCountdown: 0, bRound: 1, bRunning: false, bDone: false, bTimer: null,
  // text/guided
  tStarted: false, tRound: 1, tTranscript: '', tRecording: false, tTimeLeft: 0, tTimer: null, tDone: false,
  // coach
  coachMsgs: [{ role:'assistant', text:'Привет! Я твой AI-коуч по голосу и речи 🎤\n\nМогу помочь с:\n• Выбором упражнений под цель\n• Проблемами с голосом и дикцией\n• Советами для публичных выступлений\n\nО чём поговорим?' }],
  coachLoading: false,
  // stats
  stats: { streak:0, mins:0, today:0, lastDate:null, history:[] },
  // sub
  showSub: false,
};

function today() { return new Date().toDateString(); }
function yesterday() { return new Date(Date.now()-86400000).toDateString(); }
function greet() {
  const h = new Date().getHours();
  return h<12 ? 'Доброе утро' : h<18 ? 'Добрый день' : 'Добрый вечер';
}

// ═══════════════════════════════════════════
// SAVE / LOAD STATS
// ═══════════════════════════════════════════
async function loadStats() {
  try {
    const raw = await store.get('vt2_stats');
    if (raw) {
      const s = JSON.parse(raw);
      if (s.lastDate !== today() && s.lastDate !== yesterday()) s.streak = 0;
      if (s.lastDate !== today()) s.today = 0;
      S.stats = s;
    }
  } catch(e) {}
}

function saveStats() {
  store.set('vt2_stats', JSON.stringify(S.stats));
}

function completeExercise(ex) {
  const t = today();
  const s = S.stats;
  const newStreak = s.lastDate===t ? s.streak : (s.lastDate===yesterday() ? s.streak+1 : 1);
  S.stats = {
    streak: newStreak,
    mins: s.mins + (ex.mins||1),
    today: s.lastDate===t ? s.today+1 : 1,
    lastDate: t,
    history: [...(s.history||[]).slice(-60), { date:t, id:ex.id }],
  };
  saveStats();
  tg.HapticFeedback.notificationOccurred('success');
  showDone(ex);
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function clearTimers() {
  clearInterval(S.bTimer); S.bTimer = null;
  clearInterval(S.tTimer); S.tTimer = null;
  if (S.tRecording) stopRec();
}

function goTab(tab) {
  clearTimers();
  S.tab = tab; S.catId = null; S.exercise = null; S.showSub = false;
  tg.BackButton.hide();
  render();
  if (tab === 'coach') scrollCoach();
}

function openCat(id) {
  S.catId = id;
  tg.BackButton.show();
  render();
}

function openEx(ex) {
  clearTimers();
  S.exercise = ex;
  S.bPhases = buildPhases(ex.pattern||{});
  S.bPhaseIdx = 0;
  S.bRound = 1;
  S.bCountdown = S.bPhases[0]?.dur || 4;
  S.bRunning = false; S.bDone = false;
  S.tStarted = false; S.tRound = 1; S.tTranscript = '';
  S.tTimeLeft = ex.dur || 60; S.tDone = false;
  tg.BackButton.show();
  render();
}

function closeEx() {
  clearTimers();
  S.exercise = null;
  if (S.catId) tg.BackButton.show(); else tg.BackButton.hide();
  render();
}

tg.BackButton.onClick(() => {
  if (S.exercise) { closeEx(); return; }
  if (S.catId) { S.catId = null; tg.BackButton.hide(); render(); return; }
  if (S.tab === 'coach') { S.tab = 'home'; tg.BackButton.hide(); render(); }
});

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  if (S.exercise) { app.innerHTML = renderExercise(); bindEx(); return; }

  const screens = {
    home: renderHome,
    exercises: renderExercises,
    coach: renderCoach,
    progress: renderProgress,
  };
  app.innerHTML = (screens[S.tab] || renderHome)() + renderNav();
  bindGlobal();

  if (S.tab === 'home') startWave();
  if (S.tab === 'coach') { scrollCoach(); bindCoach(); }
}

function renderNav() {
  const tabs = [
    { id:'home',      icon:'🏠', label:'Главная'    },
    { id:'exercises', icon:'🎯', label:'Упражнения' },
    { id:'coach',     icon:'🤖', label:'AI-Коуч'    },
    { id:'progress',  icon:'📈', label:'Прогресс'   },
  ];
  return `<nav class="nav">${tabs.map(t=>`
    <button class="nav-btn" data-tab="${t.id}">
      <span class="nav-icon">${t.icon}</span>
      <span class="nav-label ${S.tab===t.id?'on':''}">${t.label}</span>
    </button>`).join('')}</nav>`;
}

function renderExercise() {
  const ex = S.exercise;
  if (ex.type === 'breathing') return renderBreathing(ex);
  return renderTextEx(ex);
}

function renderBreathing(ex) {
  if (S.bDone) return renderDoneScreen(ex);
  const phases = S.bPhases;
  const totalSec = phases.reduce((s,p)=>s+p.dur,0) * ex.rounds;
  const elapsed = (S.bRound-1)*phases.reduce((s,p)=>s+p.dur,0) + phases.slice(0,S.bPhaseIdx).reduce((s,p)=>s+p.dur,0) + (phases[S.bPhaseIdx]?.dur||4) - S.bCountdown;
  const pct = Math.min(100, (elapsed/totalSec)*100);

  return `
  <div class="ex-screen">
    <div class="ex-hdr">
      <button class="close" id="ex-close">✕</button>
      <span style="color:#9A93A0;font-size:13px" id="breath-round">Раунд ${S.bRound} из ${ex.rounds}</span>
      <div style="width:32px"></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="text-align:center;padding:16px 20px 0">
      <h2 style="font-size:20px;font-weight:700">${ex.title}</h2>
    </div>
    <div class="breath-center">
      ${!S.bRunning ? `<button class="btn btn-p" style="width:auto;padding:16px 48px;font-size:16px" id="breath-start">Начать</button>` : `
      <div id="breath-circle">
        <div id="breath-num">${S.bCountdown}</div>
        <div id="breath-phase">Вдох</div>
      </div>
      <div class="breath-dots">
        ${phases.map((p,i)=>`
        <div class="b-dot-wrap">
          <div class="b-dot ${i===S.bPhaseIdx?'on':''}" style="${i===S.bPhaseIdx?`background:${p.color};color:${p.color}`:''}"></div>
          <div class="b-dot-dur" style="${i===S.bPhaseIdx?`color:${p.color}`:''}">${p.dur}с</div>
          <div class="b-dot-name">${p.name}</div>
        </div>`).join('')}
      </div>`}
    </div>
  </div>`;
}

function renderTextEx(ex) {
  if (S.tDone) return renderDoneScreen(ex);
  const total = ex.rounds || 1;
  const isGuided = ex.type === 'guided';
  const isSpeech = ex.type === 'speech';
  const timeLeft = S.tTimeLeft;
  const timerDone = isGuided && S.tStarted && timeLeft <= 0;

  const dots = total > 1 ? `<div style="display:flex;gap:6px">
    ${Array.from({length:total},(_,i)=>`<div style="width:8px;height:8px;border-radius:50%;background:${i<S.tRound?'#E85D43':'#38343F'}"></div>`).join('')}
  </div>` : '<div style="width:46px"></div>';

  const timer = isGuided && S.tStarted ? `
  <div style="width:46px;height:46px;border-radius:50%;border:2px solid ${timeLeft<10?'#EF4444':'#E85D43'};display:flex;align-items:center;justify-content:center;color:${timeLeft<10?'#EF4444':'#E85D43'};font-size:17px;font-weight:800">${timeLeft}</div>
  ` : '<div style="width:46px"></div>';

  return `
  <div class="ex-screen">
    <div class="ex-hdr">
      <button class="close" id="ex-close">✕</button>
      ${dots}
      ${timer}
    </div>
    <div class="ex-body">
      <h2 style="font-size:20px;font-weight:700;margin-bottom:16px">${ex.title}</h2>

      ${ex.inst ? `<div class="card" style="margin-bottom:14px">
        <p class="lbl">Как делать</p>
        <p style="color:#D8D2DE;font-size:14px;line-height:1.65">${ex.inst}</p>
      </div>` : ''}

      ${ex.text ? `<div class="text-block">
        <p class="lbl">Произнеси вслух</p>
        <p class="read-text">${ex.text}</p>
      </div>` : ''}

      ${S.tTranscript ? `<div class="transcript">
        <p style="color:#6E6676;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Распознано</p>
        <p style="color:#FFFFFF;font-size:13px;line-height:1.55">${S.tTranscript}</p>
      </div>` : ''}

      <div class="mt">
        ${!S.tStarted
          ? `<button class="btn btn-p" id="ex-start">Начать упражнение</button>`
          : `<div class="gap-10">
              ${isSpeech ? `<button class="btn ${S.tRecording?'btn-r':'btn-pk'}" id="ex-mic">${S.tRecording?'⏹ Стоп запись':'🎤 Проверить произношение'}</button>` : ''}
              ${!S.tRecording && (!isGuided || timerDone)
                ? `<button class="btn ${S.tRound>=total?'btn-g':'btn-p'}" id="ex-next">${S.tRound>=total?'Завершить ✓':'Следующий повтор →'}</button>`

                ? `<button class="btn btn-d" id="ex-skip">Пропустить</button>`
                : ''}

  </div>`;
}

function msgHtml(m) {
  if (m.role==='user') return `<div class="msg msg-r"><div class="bubble bubble-u">${m.text}</div></div>`;
  return `<div class="msg msg-l"><div class="avatar">🎤</div><div class="bubble bubble-b">${m.text}</div></div>`;
}

function loadingDots() {
  return `<div class="msg msg-l"><div class="avatar">🎤</div><div class="bubble bubble-b" style="padding:12px 16px">
    <span class="dot" style="animation-delay:0s"></span>
    <span class="dot" style="animation-delay:.2s;margin:0 4px"></span>
    <span class="dot" style="animation-delay:.4s"></span>
  </div></div>`;
}

function scrollCoach() {
  setTimeout(()=>{ const el=document.getElementById('chat-msgs'); if(el) el.scrollTop=el.scrollHeight; }, 50);
}

async function sendCoach(text) {
  if (!text.trim() || S.coachLoading) return;
  S.coachMsgs.push({ role:'user', text });
  S.coachLoading = true;
  renderCoachPartial();

  try {
    const msgs = S.coachMsgs.filter(m=>m.role!=='system').map(m=>({ role:m.role, content:m.text }));
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ messages: msgs }),
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Не могу ответить прямо сейчас. Попробуй ещё раз.';
    S.coachMsgs.push({ role:'assistant', text:reply });
  } catch(e) {
    S.coachMsgs.push({ role:'assistant', text:'Ошибка соединения. Попробуй ещё раз.' });
  }
  S.coachLoading = false;
  renderCoachPartial();
}

function renderCoachPartial() {
  const msgs = document.getElementById('chat-msgs');
  if (!msgs) return;
  msgs.innerHTML = S.coachMsgs.map(m=>msgHtml(m)).join('') + (S.coachLoading?loadingDots():'');
  msgs.scrollTop = msgs.scrollHeight;
}

// ═══════════════════════════════════════════
// WAVE ANIMATION
// ═══════════════════════════════════════════
let waveFrame = null;
function startWave() {
  const c = document.getElementById('wave'); if(!c) return;
  const ctx = c.getContext('2d');
  c.width = c.offsetWidth; c.height = 52;
  let t = 0;
  const waves = [
    { a:13, f:0.035, s:1.8, col:'rgba(232,93,67,0.65)' },
    { a:8,  f:0.055, s:2.4, col:'rgba(255,177,153,0.45)' },
    { a:5,  f:0.075, s:1.4, col:'rgba(255,159,69,0.35)' },
  ];
  cancelAnimationFrame(waveFrame);
  (function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    waves.forEach(w=>{
      ctx.beginPath(); ctx.strokeStyle=w.col; ctx.lineWidth=2;
      for(let x=0;x<=c.width;x+=2){
        const y=26+w.a*Math.sin(w.f*x+t*w.s*0.02);
        x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
    });
    t++;
    waveFrame = requestAnimationFrame(draw);
  })();
}

// ═══════════════════════════════════════════
// BREATHING EXERCISE LOGIC
// ═══════════════════════════════════════════
function startBreathing() {
  S.bRunning = true;
  render();
  applyBreathPhase();

  S.bTimer = setInterval(()=>{
    S.bCountdown--;
    const numEl = document.getElementById('breath-num');
    if (numEl) numEl.textContent = S.bCountdown;

    if (S.bCountdown <= 0) {
      S.bPhaseIdx = (S.bPhaseIdx+1) % S.bPhases.length;
      if (S.bPhaseIdx === 0) {
        S.bRound++;
        if (S.bRound > S.exercise.rounds) {
          clearInterval(S.bTimer);
          S.bDone = true;
          render();
          return;
        }
        const roundEl = document.getElementById('breath-round');
        if (roundEl) roundEl.textContent = `Раунд ${S.bRound} из ${S.exercise.rounds}`;
      }
      S.bCountdown = S.bPhases[S.bPhaseIdx].dur;
      applyBreathPhase();
    }
  }, 1000);
}

function applyBreathPhase() {
  const phase = S.bPhases[S.bPhaseIdx];
  if (!phase) return;
  const circle = document.getElementById('breath-circle');
  if (circle) {
    circle.style.transition = `transform ${phase.dur}s ease-in-out, border-color .5s, box-shadow .5s, background .5s`;
    circle.style.transform = `scale(${phase.scale})`;
    circle.style.borderColor = phase.color;
    circle.style.boxShadow = `0 0 40px ${phase.color}50, 0 0 80px ${phase.color}25`;
    circle.style.background = `${phase.color}12`;
    const phEl = circle.querySelector('#breath-phase');
    const nmEl = circle.querySelector('#breath-num');
    if (phEl) { phEl.textContent = phase.name; phEl.style.color = phase.color; }
    if (nmEl) { nmEl.textContent = S.bCountdown; nmEl.style.color = phase.color; }
  }
  // Update dots
  S.bPhases.forEach((_,i)=>{
    const dot = document.querySelectorAll('.b-dot')[i];
    const durEl = document.querySelectorAll('.b-dot-dur')[i];
    if (!dot) return;
    dot.classList.toggle('on', i===S.bPhaseIdx);
    if (i===S.bPhaseIdx) {
      dot.style.background = S.bPhases[i].color;
      dot.style.color = S.bPhases[i].color;
      if(durEl) durEl.style.color = S.bPhases[i].color;
    } else {
      dot.style.background = '';
      if(durEl) durEl.style.color = '';
    }
  });
  tg.HapticFeedback.impactOccurred('light');
}

// ═══════════════════════════════════════════
// TEXT EXERCISE LOGIC
// ═══════════════════════════════════════════
function startTextEx() {
  S.tStarted = true;
  render();
  if (S.exercise.type === 'guided') startGuidedTimer();
}

function startGuidedTimer() {
  S.tTimeLeft = S.exercise.dur || 60;
  S.tTimer = setInterval(()=>{
    S.tTimeLeft--;
    const timerEl = document.querySelector('.ex-hdr div:last-child');
    // Re-render header only
    const el = document.querySelector('.ex-hdr');
    if (el && S.exercise.type === 'guided') {
      const totalRounds = S.exercise.rounds||1;
      const dots = totalRounds>1
        ? `<div style="display:flex;gap:6px">${Array.from({length:totalRounds},(_,i)=>`<div style="width:8px;height:8px;border-radius:50%;background:${i<S.tRound?'#E85D43':'#38343F'}"></div>`).join('')}</div>`
        : '<div style="width:46px"></div>';
      el.innerHTML = `
        <button class="close" id="ex-close">✕</button>
        ${dots}
        <div style="width:46px;height:46px;border-radius:50%;border:2px solid ${S.tTimeLeft<10?'#EF4444':'#E85D43'};display:flex;align-items:center;justify-content:center;color:${S.tTimeLeft<10?'#EF4444':'#E85D43'};font-size:17px;font-weight:800">${S.tTimeLeft}</div>`;
      document.getElementById('ex-close')?.addEventListener('click', closeEx);
    }
    if (S.tTimeLeft<=0) {
      clearInterval(S.tTimer);
      // Show next button
      render();
    }
  }, 1000);
}

// Speech recognition
let recog = null;
function startRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Распознавание речи не поддерживается. Попробуйте в Chrome.'); return; }
  recog = new SR();
  recog.lang = 'ru-RU'; recog.continuous = true; recog.interimResults = true;
  recog.onresult = e => {
    S.tTranscript = Array.from(e.results).map(r=>r[0].transcript).join(' ');
    const el = document.querySelector('.transcript p:last-child');
    if (el) el.textContent = S.tTranscript;
  };
  recog.start(); S.tRecording = true;
  tg.HapticFeedback.impactOccurred('medium');
}
function stopRec() {
  recog?.stop(); recog = null; S.tRecording = false;
  tg.HapticFeedback.impactOccurred('light');
}

function nextRound() {
  S.tTranscript = '';
  if (S.tRound >= (S.exercise.rounds||1)) {
    S.tDone = true;
  } else {
    S.tRound++;
    S.tTimeLeft = S.exercise.dur||60;
    if (S.exercise.type==='guided') startGuidedTimer();
  }
  render();
}

// ═══════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════
function bindGlobal() {
  // Nav
  document.querySelectorAll('[data-tab]').forEach(el=>{
    el.addEventListener('click', ()=>goTab(el.dataset.tab));
  });
  // Category cards
  document.querySelectorAll('[data-cat]').forEach(el=>{
    el.addEventListener('click', ()=>{ tg.HapticFeedback.selectionChanged(); openCat(el.dataset.cat); });
  });
  // Exercise cards
  document.querySelectorAll('[data-ex]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const ex = ALL_EX.find(e=>e.id===el.dataset.ex);
      if (ex) { tg.HapticFeedback.selectionChanged(); openEx(ex); }
    });
  });
  // Back from category
  document.querySelector('[data-back="cat"]')?.addEventListener('click', ()=>{
    S.catId=null; tg.BackButton.hide(); render();
  });
  // Progress sub button
  document.getElementById('show-sub')?.addEventListener('click', showSubModal);
}

function bindEx() {
  document.getElementById('ex-close')?.addEventListener('click', closeEx);
  document.getElementById('breath-start')?.addEventListener('click', startBreathing);
  document.getElementById('ex-start')?.addEventListener('click', startTextEx);
  document.getElementById('ex-mic')?.addEventListener('click', ()=>{ S.tRecording?stopRec():startRec(); render(); });
  document.getElementById('ex-next')?.addEventListener('click', nextRound);
  document.getElementById('ex-skip')?.addEventListener('click', ()=>{ S.tDone=true; render(); });
  document.getElementById('done-complete')?.addEventListener('click', ()=>{ completeExercise(S.exercise); closeEx(); });
  document.getElementById('done-close')?.addEventListener('click', ()=>{ closeEx(); goTab('home'); });
}

function bindCoach() {
  const inp = document.getElementById('chat-inp');
  const send = document.getElementById('chat-send');
  if (!inp || !send) return;
  send.addEventListener('click', ()=>{ sendCoach(inp.value); inp.value=''; });
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendCoach(inp.value); inp.value=''; }});
  document.querySelectorAll('.quick-q').forEach(el=>{
    el.addEventListener('click', ()=>{ sendCoach(el.dataset.q); });
  });
}

// ═══════════════════════════════════════════

  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:flex-end;max-width:430px;margin:0 auto;';
  modal.innerHTML = `
    <div style="background:#28252F;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;border:1px solid #38343F">
      <div class="sub-card">
        <div class="price">$7</div>
        <div class="price-sub">в месяц · отмена в любой момент</div>
        <div class="feature-list">
          ${['✅ Все упражнения без ограничений','✅ AI-коуч без лимитов','✅ Отслеживание прогресса','✅ Ежедневные напоминания','✅ Новые упражнения каждую неделю'].map(f=>`<div class="feature-item">${f}</div>`).join('')}
        </div>
      </div>
      <button class="btn btn-p" id="sub-confirm">Оформить подписку</button>
      <button class="btn" style="background:none;color:#9A93A0;margin-top:10px" id="sub-close">Не сейчас</button>
    </div>`;
  document.body.appendChild(modal);
  document.getElementById('sub-close')?.addEventListener('click', ()=>modal.remove());
  document.getElementById('sub-confirm')?.addEventListener('click', ()=>{
    alert('💳 Здесь будет Telegram Stars или ЮKassa платёж.\nПока в разработке!');
    modal.remove();
  });
}
